name: Android Build
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export Android Debug
        uses: barichello/godot-export@v0.7.0
        with:
          version: 4.2.2
          platform: android
          export_debug: true
