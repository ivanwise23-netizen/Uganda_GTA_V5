name: Build Android APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Godot
      uses: firebelley/godot-export@v5
      with:
        godot_version: 4.2.2
        export_templates: 4.2.2
        platform: android
        project_path: .
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Uganda_GTA.apk
        path: build/android/*.apk
